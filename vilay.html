<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vilay - Shubhangi Tawar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #080A11;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .pdf-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            background-color: #0A0D18;
            margin-bottom: 50px;
        }
        .pdf-page {
            width: 100%;
            height: auto;
            display: block;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: linear-gradient(135deg, #E32636 0%, #8B3A3A 100%);
            color: #F9F6ED;
            padding: 10px 20px;
            text-decoration: none;
            font-family: 'Outfit', sans-serif;
            border-radius: 4px;
            z-index: 1000;
            transition: transform 0.3s, box-shadow 0.3s;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(227, 38, 54, 0.3);
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(227, 38, 54, 0.5);
        }
    </style>
</head>
<body>
    <a href="index.html#collections" class="back-btn">← Back to Portfolio</a>
    <div class="pdf-container">
        <!-- Organized in chronological project order -->
        <img src="ajarakh project.jpg" class="pdf-page" alt="Vilay Project Page 1">
        <img src="ajarakh project2.jpg" class="pdf-page" alt="Vilay Project Page 2">
        <img src="ajarakh project3.jpg" class="pdf-page" alt="Vilay Project Page 3">
        <img src="ajarakh project4.jpg" class="pdf-page" alt="Vilay Project Page 4">
        <img src="ajarakh project5.jpg" class="pdf-page" alt="Vilay Project Page 5">
        <img src="ajarakh project6.jpg" class="pdf-page" alt="Vilay Project Page 6">
        <img src="ajarakh project7.jpg" class="pdf-page" alt="Vilay Project Page 7">
        <img src="ajarakh project8.jpg" class="pdf-page" alt="Vilay Project Page 8">
        <img src="ajarakh project9.jpg" class="pdf-page" alt="Vilay Project Page 9">
        <img src="ajarakh project10.jpg" class="pdf-page" alt="Vilay Project Page 10">
        <img src="ajarakh project11.jpg" class="pdf-page" alt="Vilay Project Page 11">
    </div>
</body>
</html>
